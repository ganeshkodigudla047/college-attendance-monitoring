<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - College Attendance</title>
  <link rel="stylesheet" href="register.css">
</head>

<body class="auth-page">

  <div class="container registration-container">
    <div class="header">
      <div class="role-badge" id="roleBadge"></div>
      <h2 id="formTitle">Registration</h2>
      <p id="tokenStatus" class="status-msg"></p>
    </div>

    <!-- STEP 1 -->
    <div id="step1" class="step-content">
      <div class="input-group">
        <input id="email" type="email" placeholder="Email" autocomplete="email">
        <div class="password-field">
          <input id="password" type="password" placeholder="Password" autocomplete="new-password">
          <button type="button" class="password-toggle" data-target="password" aria-label="Show password">👁</button>
        </div>
      </div>

      <button id="registerBtn" class="primary-btn">Register & Verify</button>
      <p id="msg" class="status-msg"></p>

      <button id="continueBtn" class="secondary-btn hidden">Continue to Profile</button>
    </div>

    <!-- STEP 2 -->
    <div id="step2" class="step-content hidden">

      <div class="photo-section">
        <label for="photo" class="photo-upload-label">
          <div class="photo-placeholder">
            <img id="preview" src="" alt="Profile Preview" style="display: none;">
            <span id="uploadHint">
              <span style="font-size: 28px; display: block; margin-bottom: 4px;">📷</span>
              Upload Photo
            </span>
          </div>
          <input type="file" id="photo" accept="image/*" class="hidden">
        </label>
      </div>

      <!-- FACE CAPTURE (STUDENTS ONLY) -->
      <div id="faceCaptureSection" class="face-capture-section hidden">
        <h3>Register Face</h3>
        <div class="video-container">
          <video id="video" autoplay muted playsinline></video>
          <canvas id="overlay" class="hidden"></canvas>
          <div id="captureFeedback" class="capture-feedback hidden">✓ Captured</div>
        </div>
        <p id="faceMsg" class="face-status-msg">Position your face in the frame</p>
        <button id="captureBtn" class="secondary-btn">Capture Face</button>
      </div>

      <div class="input-group">
        <input id="name" placeholder="Full Name">
        <small id="nameErr" class="error-text hidden">Full name is required</small>

        <input id="phone" placeholder="Phone (10 digits)" maxlength="10">
        <small id="phoneErr" class="error-text hidden">Invalid phone number (10 digits)</small>
      </div>

      <!-- COLLEGE SELECTION (for non-token registrations) -->
      <div id="collegeSelection" class="input-group hidden">
        <select id="collegeSelect">
          <option value="" disabled selected>Select College/Institution</option>
        </select>
        <small id="collegeErr" class="error-text hidden">Please select a college</small>
      </div>

      <!-- STUDENT -->
      <div id="studentFields" class="role-fields hidden">
        <input id="studentId" placeholder="Student ID">

        <div class="select-group">
          <select id="studentDept">
            <option value="" disabled selected>Department</option>
            <option>CSE</option>
            <option>CSD</option>
            <option>CSM</option>
            <option>ECE</option>
            <option>MECH</option>
            <option>CIVIL</option>
            <option>EEE</option>
          </select>

          <select id="year">
            <option value="" disabled selected>Year</option>
            <option>1</option>
            <option>2</option>
            <option>3</option>
            <option>4</option>
          </select>
        </div>

        <select id="studentHodId">
          <option value="" disabled selected>Select HOD</option>
        </select>

        <select id="inchargeId">
          <option value="" disabled selected>Select Incharge</option>
        </select>
      </div>

      <!-- INCHARGE / HOD -->
      <div id="staffFields" class="role-fields hidden">
        <input id="staffId" placeholder="Staff ID">
        <select id="staffDept">
          <option value="" disabled selected>Department</option>
          <option>CSE</option>
          <option>CSD</option>
          <option>CSM</option>
          <option>ECE</option>
          <option>MECH</option>
          <option>CIVIL</option>
          <option>EEE</option>
        </select>
        <select id="staffHodId">
          <option value="" disabled selected>HOD (optional)</option>
        </select>
      </div>

      <!-- ADMIN / PRINCIPAL -->
      <div id="adminFields" class="role-fields hidden">
        <input id="adminCollegeName" placeholder="College" readonly>
        <input id="adminStaffId" placeholder="Staff ID">
      </div>

      <button id="submitBtn" class="primary-btn" disabled>Complete Registration</button>
    </div>

  </div>

  <!-- Face Recognition Library -->
  <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
  <script type="module" src="register.js"></script>
  <script>
    // Prevent back navigation to previous pages - always redirect to index
    window.history.pushState(null, "", window.location.href);
    window.onpopstate = function() {
      window.history.pushState(null, "", window.location.href);
      window.location.href = "index.html?skipIntro=1";
    };
  </script>
</body>

</html>
