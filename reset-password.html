<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password</title>
  <link rel="stylesheet" href="login.css">
</head>

<body class="auth-page">

  <div class="container">
    <h2>Reset Password</h2>
    <p style="margin-bottom: 24px; color: #64748b; font-size: 14px; line-height: 1.5;">
      Enter your new password below.
    </p>

    <input id="newPassword" type="password" placeholder="New Password" minlength="6">
    <input id="confirmPassword" type="password" placeholder="Confirm New Password" minlength="6">

    <button id="resetBtn">Reset Password</button>
    <p id="status"></p>

    <div class="forgot-password-section">
      <a href="login.html">Back to Login</a>
    </div>
  </div>

  <script type="module" src="reset-password.js"></script>
</body>
</html>
